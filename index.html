<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Vertex Spire Phase II - Silhouette</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0b1326",
                        "primary": "#a4c9ff",
                        "tertiary": "#e9c176",
                        "surface-container-low": "#131b2e",
                        "on-surface": "#dae2fd"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .hud-grid {
            background-image: linear-gradient(#43474c 0.5px, transparent 0.5px), linear-gradient(90deg, #43474c 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            opacity: 0.05;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-surface text-on-surface">

    <header class="w-full top-0 sticky bg-[#0b1326] z-50 border-b border-white/5">
        <div class="flex justify-between items-center px-8 py-4 w-full bg-[#131b2e]">
            <div class="flex items-center gap-8">
                <span class="text-xl font-bold tracking-widest font-['Manrope']">SILHOUETTE</span>
                <nav class="hidden md:flex items-center gap-6 text-sm uppercase tracking-wider">
                    <a href="#projects-section" class="opacity-70 hover:opacity-100 hover:text-primary transition-all">Projects</a>
                    <a href="#analysis-section" class="text-primary border-b border-primary pb-1">Analysis</a>
                    <a href="#log-section" class="opacity-70 hover:opacity-100 hover:text-primary transition-all">Logs</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="alert('No new notifications')" class="text-primary"><span class="material-symbols-outlined">notifications</span></button>
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-white/10">
                    <span class="material-symbols-outlined text-primary">person</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1">
        <aside class="w-64 sticky top-[72px] h-[calc(100vh-72px)] bg-[#131b2e] p-6 hidden lg:flex flex-col gap-8">
            <div>
                <h2 class="text-primary font-bold uppercase tracking-widest text-sm mb-1">Vertex Spire</h2>
                <p class="text-[10px] opacity-50 uppercase tracking-[0.2em]">Riyadh - Phase II</p>
            </div>
            <nav class="flex flex-col gap-4">
                <a href="#" class="flex items-center gap-3 text-primary font-bold"><span class="material-symbols-outlined">architecture</span> Structural</a>
                <a href="#" class="flex items-center gap-3 opacity-50 hover:opacity-100"><span class="material-symbols-outlined">sensors</span> Telemetry</a>
                <a href="#" class="flex items-center gap-3 opacity-50 hover:opacity-100"><span class="material-symbols-outlined">layers</span> Materials</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 relative overflow-hidden">
            <div class="absolute inset-0 hud-grid pointer-events-none"></div>
